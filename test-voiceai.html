<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Companeeds</title>
    <style>
        :root {
            --primary-color: #0077FF;
            --primary-dark: #0066DD;
            --accent-color: #2CE6B5;
            --background: #F8F9FA;
            --surface: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --success: #10B981;
            --error: #EF4444;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--background); color: var(--text-primary); line-height: 1.6; }
        .chat-container { max-width: 800px; margin: 0 auto; height: 100vh; background: var(--surface); display: flex; flex-direction: column; box-shadow: var(--shadow-lg); }
        .chat-header { background: linear-gradient(135deg, var(--primary-color), var(--accent-color)); color: white; padding: 1.5rem; text-align: center; position: relative; }
        .ai-avatar { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 2rem; backdrop-filter: blur(10px); }
        .ai-avatar.speaking { animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .chat-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .chat-subtitle { opacity: 0.9; font-size: 0.9rem; }
        .connection-status { position: absolute; top: 1rem; right: 1rem; padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.75rem; font-weight: 600; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); }
        .connection-status.connected { background: rgba(16, 185, 129, 0.2); color: white; }
        .connection-status.connecting { background: rgba(245, 158, 11, 0.2); color: white; }
        .connection-status.error { background: rgba(239, 68, 68, 0.2); color: white; }
        .connection-status.listening { background: rgba(239, 68, 68, 0.3); color: white; animation: pulse 2s ease-in-out infinite; }
        .connection-status.processing { background: rgba(16, 185, 129, 0.3); color: white; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; background: #f8f9fa; display: flex; flex-direction: column; gap: 1rem; }
        .message { display: flex; gap: 0.75rem; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { flex-direction: row-reverse; }
        .message-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
        .message.ai .message-avatar { background: linear-gradient(135deg, var(--primary-color), var(--accent-color)); color: white; }
        .message.user .message-avatar { background: var(--border); color: var(--text-secondary); }
        .message-content { max-width: 70%; padding: 1rem 1.25rem; border-radius: 1.25rem; position: relative; }
        .message.ai .message-content { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 0.5rem; }
        .message.user .message-content { background: var(--primary-color); color: white; border-bottom-right-radius: 0.5rem; }
        .message-text { margin-bottom: 0.5rem; }
        .message-time { font-size: 0.75rem; opacity: 0.7; }
        .quick-options { display: grid; gap: 0.75rem; margin-top: 1rem; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
        .quick-option { background: var(--surface); border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem; cursor: pointer; transition: all 0.2s ease; text-align: left; }
        .quick-option:hover { border-color: var(--primary-color); background: rgba(0, 119, 255, 0.05); transform: translateY(-2px); }
        .option-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .option-title { font-weight: 600; margin-bottom: 0.25rem; color: var(--text-primary); }
        .option-subtitle { font-size: 0.875rem; color: var(--text-secondary); }
        .input-form { padding: 1rem; background: var(--surface); border-top: 1px solid var(--border); margin-top: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-primary); }
        .form-group input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 1rem; transition: border-color 0.2s ease; }
        .form-group input:focus { outline: none; border-color: var(--primary-color); }
        .submit-btn { width: 100%; background: var(--primary-color); color: white; padding: 0.875rem 1rem; border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background-color 0.2s ease; }
        .submit-btn:hover { background: var(--primary-dark); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        @media (max-width: 768px) { .chat-container { height: 100vh; border-radius: 0; } .quick-options { grid-template-columns: 1fr; } .message-content { max-width: 85%; } }
        .vapi-widget-container { display: none !important; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="connection-status" id="connectionStatus">Ready</div>
            <div class="ai-avatar" id="aiAvatar">🤖</div>
            <div class="chat-title">Companeeds AI Assistant</div>
            <div class="chat-subtitle" id="chatSubtitle">Click or type to start voice chat</div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
    </div>

    <script>
        const VAPI_API_KEY = 'df33a1af-ef1e-4ef7-ae0e-6f89239d594b';
        const VAPI_ASSISTANT_ID = '4cd3d9db-8b67-4404-bc51-07c7f7f88ba0';
        const GHL_WEBHOOK_URL = 'https://services.leadconnectorhq.com/hooks/FL2r5c4AyrqlNBuFs1oD/webhook-trigger/2cea896f-a6bc-4adf-8d90-44c740273e70';
        
        const conversationFlow = [ { id: 'welcome', message: "Hi! I'm your AI assistant at Companeeds. I'll help you get matched with the perfect AI expert for your business. What's your company name?", type: 'text_input', field: 'companyName', placeholder: 'Enter your company name' }, { id: 'revenue', message: "Great! Now, what's your current annual revenue? This helps us match you with experts who understand your business scale.", type: 'options', field: 'annualRevenue', options: [ { value: '$0 - $5M', title: '$0 - $5M', subtitle: 'Startup/Small business', icon: '🌱' }, { value: '$5M - $50M', title: '$5M - $50M', subtitle: 'Growing business', icon: '🚀' }, { value: '$50M - $200M', title: '$50M - $200M', subtitle: 'Established company', icon: '🏢' }, { value: '$200M+', title: '$200M+', subtitle: 'Enterprise level', icon: '🏛️' } ] }, { id: 'employees', message: "Perfect! How many employees do you have? This helps us recommend the right AI implementation approach.", type: 'options', field: 'employees', options: [ { value: '0-10', title: '0 - 10 employees', subtitle: 'Small team, close-knit operations', icon: '👤' }, { value: '11-50', title: '11 - 50 employees', subtitle: 'Medium-sized team with structured roles', icon: '👥' }, { value: '50-200', title: '50 - 200 employees', subtitle: 'Large organization with multiple departments', icon: '🏢' }, { value: '200+', title: '200+ employees', subtitle: 'Enterprise scale with complex operations', icon: '🏙️' } ] }, { id: 'industry', message: "Thanks! What industry is your company in? I'll match you with AI experts who have experience in your sector.", type: 'text_input', field: 'industry', placeholder: 'e.g., Technology, Healthcare, Finance' }, { id: 'goals', message: "Now for the important part - what would you like to achieve with AI? This helps me understand your primary objectives.", type: 'options', field: 'aiGoals', options: [ { value: 'Increase Lead Flow and Automate Sales Process', title: 'Boost Sales & Lead Generation', subtitle: 'Increase lead flow and automate sales process', icon: '📈' }, { value: 'Automate Manual Process', title: 'Process Automation', subtitle: 'Streamline and automate manual tasks', icon: '⚡' }, { value: 'Build custom AI products for my company', title: 'Custom AI Solutions', subtitle: 'Build custom AI products for your company', icon: '🔧' }, { value: 'All the above', title: 'Comprehensive AI Transformation', subtitle: 'Complete AI integration across business', icon: '🎯' }, { value: 'Im not sure, looking for your guidance', title: 'Need Expert Guidance', subtitle: 'Looking for expert advice on AI opportunities', icon: '🤔' } ] }, { id: 'problems', message: "This is crucial - what are your biggest pain points right now? Understanding your challenges helps me prioritize the AI solutions that will have the most impact.", type: 'options', field: 'painPoints', options: [ { value: 'Lack of standardization and organization', title: 'Lack of Organization', subtitle: 'Processes lack standardization', icon: '📋' }, { value: 'Too many manual tasks', title: 'Too Many Manual Tasks', subtitle: 'Time-consuming repetitive work', icon: '🔄' }, { value: 'Not enough lead flow', title: 'Insufficient Lead Generation', subtitle: 'Not generating enough quality leads', icon: '📉' }, { value: 'Other', title: 'Other Challenges', subtitle: 'Different pain points not covered above', icon: '💭' } ] }, { id: 'contact', message: "Excellent! I have a good understanding of your needs. To complete the matching process and potentially schedule a consultation call, I'll need your contact information.", type: 'contact_form', fields: ['fullName', 'email'] }, { id: 'complete', message: "Perfect! I've captured all your information. Based on what you've told me about your challenges, I'll have our team analyze your needs and match you with the best AI experts. Would you like to schedule a consultation call to discuss your AI strategy in detail?", type: 'final_choice', options: [ { value: 'yes', title: 'Yes, schedule a call', subtitle: 'Book a consultation with an AI expert' }, { value: 'no', title: 'Not right now', subtitle: 'Just send me the expert matches' } ] } ];
        
        let vapi = null;
        let currentStep = 0;
        let isCallActive = false;
        let conversationData = {};
        let currentStepData = conversationFlow[0];
        let isVapiReady = false;

        const chatMessages = document.getElementById('chatMessages');
        const connectionStatus = document.getElementById('connectionStatus');
        const chatSubtitle = document.getElementById('chatSubtitle');
        const aiAvatar = document.getElementById('aiAvatar');

        (function (d, t) {
            var g = document.createElement(t), s = d.getElementsByTagName(t)[0];
            g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
            g.defer = true; g.async = true;
            s.parentNode.insertBefore(g, s);
            g.onload = function () { initVapi(); };
        })(document, "script");

        function initVapi() {
            try {
                if (!window.vapiSDK) throw new Error('Vapi SDK not loaded');

                vapi = window.vapiSDK.run({
                    apiKey: VAPI_API_KEY,
                    assistant: VAPI_ASSISTANT_ID,
                    config: { position: "bottom-right", width: "0px", height: "0px", idle: { color: "transparent" }, loading: { color: "transparent" }, active: { color: "transparent" } }
                });

                vapi.on('call-start', handleCallStart);
                vapi.on('call-end', handleCallEnd);
                vapi.on('speech-start', handleSpeechStart);
                vapi.on('speech-end', handleSpeechEnd);
                vapi.on('message', handleMessage);
                vapi.on('error', handleError);
                
                isVapiReady = true;
                console.log('Vapi initialized. Waiting for user interaction to start call.');

                // ***** CORE SOLUTION: ACTIVATE ON FIRST USER INTERACTION *****
                // This respects browser security policies and provides a seamless experience.
                const handleFirstInteraction = () => {
                    if (isVapiReady && !isCallActive) {
                        console.log('User interaction detected. Starting voice call.');
                        startVoiceCall();
                    }
                };
                
                // The `{ once: true }` option ensures these listeners only fire once.
                document.addEventListener('click', handleFirstInteraction, { once: true });
                document.addEventListener('keydown', handleFirstInteraction, { once: true });

            } catch (error) {
                console.error('Failed to initialize Vapi:', error);
                updateConnectionStatus('Voice AI Error', 'error');
                chatSubtitle.textContent = "Voice AI is unavailable.";
            }
            
            startConversation(); // Start the text-based flow immediately
        }

        async function startVoiceCall() {
            try {
                updateConnectionStatus('Connecting...', 'connecting');
                chatSubtitle.textContent = "Talk to me or use the options below";
                
                const assistantOverrides = {
                    systemMessage: `You are an AI assistant for Companeeds...`, // Your system prompt
                    firstMessage: getVoicePromptForCurrentStep()
                };
                
                // This is the correct call format, which works reliably after a user gesture.
                await vapi.start(VAPI_ASSISTANT_ID, assistantOverrides);
                
            } catch (error) {
                console.error('Failed to start voice call:', error);
                updateConnectionStatus('Voice AI Failed', 'error');
                chatSubtitle.textContent = "Voice connection failed. Using text only.";
                addAIMessage("It seems there's an issue with the voice connection. Please continue by using the options on your screen.");
            }
        }
        
        // --- Event Handlers and other functions remain largely the same ---
        function handleCallStart() { isCallActive = true; updateConnectionStatus('Voice AI Active', 'connected'); aiAvatar.classList.add('speaking'); }
        function handleCallEnd() { isCallActive = false; updateConnectionStatus('Disconnected', 'error'); aiAvatar.classList.remove('speaking'); chatSubtitle.textContent = 'Voice call ended. Refresh to restart.'; }
        function handleSpeechStart() { updateConnectionStatus('Listening...', 'listening'); }
        function handleSpeechEnd() { updateConnectionStatus('Processing...', 'processing'); }
        function handleError(error) { console.error('Vapi error:', error); updateConnectionStatus('Voice AI Error', 'error'); chatSubtitle.textContent = 'An error occurred with voice AI.'; }
        function handleMessage(message) { if (message.type === 'transcript' && message.transcriptType === 'final') { if (message.role === 'user') { addUserMessage(message.transcript); } else if (message.role === 'assistant') { addAIMessage(message.transcript); } } }
        function startConversation() { addAIMessage(currentStepData.message); renderCurrentStep(); }
        function renderCurrentStep() { const step = conversationFlow[currentStep]; if (step.type === 'options') { renderOptions(step.options); } else if (step.type === 'text_input') { renderTextInput(step); } else if (step.type === 'contact_form') { renderContactForm(); } else if (step.type === 'final_choice') { renderOptions(step.options); } }
        function renderOptions(options) { const optionsHtml = options.map(option => `<div class="quick-option" onclick="selectOption('${option.value}', '${option.title}')"><div class="option-icon">${option.icon || '➡️'}</div><div class="option-title">${option.title}</div><div class="option-subtitle">${option.subtitle}</div></div>`).join(''); const optionsContainer = document.createElement('div'); optionsContainer.className = 'message ai'; optionsContainer.innerHTML = `<div class="message-avatar">🤖</div><div class="message-content"><div class="quick-options">${optionsHtml}</div></div>`; chatMessages.appendChild(optionsContainer); scrollToBottom(); }
        function renderTextInput(step) { const inputHtml = `<div class="input-form"><div class="form-group"><input type="text" id="stepInput" placeholder="${step.placeholder}" onkeypress="handleInputKeypress(event)"></div><button class="submit-btn" onclick="submitTextInput()">Continue</button></div>`; const inputContainer = document.createElement('div'); inputContainer.className = 'message ai'; inputContainer.innerHTML = `<div class="message-avatar">🤖</div><div class="message-content">${inputHtml}</div>`; chatMessages.appendChild(inputContainer); scrollToBottom(); setTimeout(() => { const input = document.getElementById('stepInput'); if (input) input.focus(); }, 100); }
        function renderContactForm() { const formHtml = `<div class="input-form"><div class="form-group"><label for="fullName">Your Full Name</label><input type="text" id="fullName" placeholder="Enter your full name"></div><div class="form-group"><label for="email">Email Address</label><input type="email" id="email" placeholder="your.email@company.com"></div><button class="submit-btn" onclick="submitContactForm()">Complete Matching Process</button></div>`; const formContainer = document.createElement('div'); formContainer.className = 'message ai'; formContainer.innerHTML = `<div class="message-avatar">🤖</div><div class="message-content">${formHtml}</div>`; chatMessages.appendChild(formContainer); scrollToBottom(); }
        function selectOption(value, title) { const step = conversationFlow[currentStep]; conversationData[step.field] = value; addUserMessage(title); if (isCallActive && vapi) { vapi.send({ type: 'add-message', message: { role: 'user', content: `I selected "${title}"` } }); setTimeout(() => { vapi.send({ type: 'add-message', message: { role: 'system', content: `The user has completed this step. Please acknowledge their selection briefly and let them proceed to the next step.` } }); }, 500); } setTimeout(() => { nextStep(); }, 500); }
        function submitTextInput() { const input = document.getElementById('stepInput'); const value = input.value.trim(); if (value) { const step = conversationFlow[currentStep]; conversationData[step.field] = value; addUserMessage(value); if (isCallActive && vapi) { vapi.send({ type: 'add-message', message: { role: 'user', content: `My ${step.field} is: ${value}` } }); setTimeout(() => { vapi.send({ type: 'add-message', message: { role: 'system', content: `The user has provided their ${step.field}. Please acknowledge briefly and let them proceed to the next step.` } }); }, 500); } setTimeout(() => { nextStep(); }, 500); } }
        function submitContactForm() { const fullName = document.getElementById('fullName').value.trim(); const email = document.getElementById('email').value.trim(); if (fullName && email) { conversationData.fullName = fullName; conversationData.email = email; addUserMessage(`${fullName} - ${email}`); if (isCallActive && vapi) { vapi.send({ type: 'add-message', message: { role: 'user', content: `My name is ${fullName} and my email is ${email}` } }); setTimeout(() => { vapi.send({ type: 'add-message', message: { role: 'system', content: `The user has provided their contact information. Please acknowledge and let them proceed to the final step.` } }); }, 500); } setTimeout(() => { nextStep(); }, 500); } }
        function handleInputKeypress(event) { if (event.key === 'Enter') { submitTextInput(); } }
        function nextStep() { currentStep++; if (currentStep < conversationFlow.length) { currentStepData = conversationFlow[currentStep]; setTimeout(() => { addAIMessage(currentStepData.message); renderCurrentStep(); if (isCallActive && vapi) { vapi.send({ type: 'add-message', message: { role: 'system', content: `The user has moved to the next step. Current step: "${currentStepData.message}". ${currentStepData.type === 'options' ? 'Please tell them to select from the options on screen.' : ''}` } }); } if (currentStepData.id === 'complete') { sendToWebhook(); } }, 1500); } }
        function addAIMessage(text) { const messageElement = document.createElement('div'); messageElement.className = 'message ai'; messageElement.innerHTML = `<div class="message-avatar">🤖</div><div class="message-content"><div class="message-text">${text}</div><div class="message-time">${getCurrentTime()}</div></div>`; chatMessages.appendChild(messageElement); scrollToBottom(); }
        function addUserMessage(text) { const messageElement = document.createElement('div'); messageElement.className = 'message user'; messageElement.innerHTML = `<div class="message-avatar">👤</div><div class="message-content"><div class="message-text">${text}</div><div class="message-time">${getCurrentTime()}</div></div>`; chatMessages.appendChild(messageElement); scrollToBottom(); }
        function scrollToBottom() { chatMessages.scrollTop = chatMessages.scrollHeight; }
        function getCurrentTime() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
        function getVoicePromptForCurrentStep() { const step = conversationFlow[currentStep]; switch (step.type) { case 'text_input': return `I can help you with the current question. ${step.message}`; case 'options': return `I can help you with the current question. ${step.message} Please select from the options on screen, or tell me your choice.`; case 'contact_form': return `I can help you provide your contact information. What's your full name and email address?`; case 'final_choice': return `We're almost done! ${step.message} You can select from the options on screen or tell me your preference.`; default: return `How can I help you with the current step?`; } }
        function updateConnectionStatus(text, status) { connectionStatus.textContent = text; connectionStatus.className = `connection-status ${status}`; }
        async function sendToWebhook() { try { const webhookData = { ...conversationData, source: 'voice_ai_chatbot', timestamp: new Date().toISOString(), lead_score: calculateLeadScore(conversationData) }; console.log('Sending to webhook:', webhookData); const response = await fetch(GHL_WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(webhookData) }); if (response.ok) { console.log('Successfully sent to GHL webhook'); } else { console.error('Failed to send to webhook:', response.statusText); } } catch (error) { console.error('Error sending to webhook:', error); } }
        function calculateLeadScore(data) { let score = 0; if (data.annualRevenue === '$200M+') score += 40; else if (data.annualRevenue === '$50M - $200M') score += 30; else if (data.annualRevenue === '$5M - $50M') score += 20; else score += 10; if (data.employees === '200+') score += 30; else if (data.employees === '50-200') score += 25; else if (data.employees === '11-50') score += 20; else score += 10; if (data.aiGoals === 'All the above') score += 20; else if (data.aiGoals !== 'Im not sure, looking for your guidance') score += 15; else score += 5; if (data.painPoints && data.painPoints !== 'Other') score += 10; return Math.min(score, 100); }
    </script>
</body>
</html>
